<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Académico</title>

<style>
body {
  background: linear-gradient(to right, #dbeafe, #bfdbfe);
  font-family: 'Trebuchet MS', sans-serif;
  text-align: center;
  margin: 0;
  animation: fondo 6s infinite alternate;
}

/* FONDO SUAVE */
@keyframes fondo {
  0% { background: linear-gradient(to right, #dbeafe, #bfdbfe); }
  100% { background: linear-gradient(to right, #bfdbfe, #93c5fd); }
}

/* TÍTULO */
h1 {
  color: #1e3a8a;
  margin-top: 20px;
  animation: fadeDown 1s ease;
}

/* CONTENEDOR */
.estudios {
  margin: 20px auto;
  width: 60%;
  background-color: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
  animation: fadeUp 1.2s ease;
}

/* ITEMS COMO LÍNEA DE TIEMPO */
.estudio-item {
  margin: 15px 0;
  padding-left: 15px;
  border-left: 5px solid #1e3a8a;
  text-align: left;
  opacity: 0;
  transform: translateX(-20px);
  animation: slideIn 0.8s forwards;
}

.estudio-item:nth-child(1) { animation-delay: 0.3s; }
.estudio-item:nth-child(2) { animation-delay: 0.6s; }
.estudio-item:nth-child(3) { animation-delay: 0.9s; }

.estudio-item:hover {
  transform: translateX(5px);
}

/* BOTÓN */
.boton {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background-color: #1e3a8a;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  transition: transform 0.2s, background 0.3s;
}

.boton:hover {
  background-color: #0f172a;
  transform: scale(1.1);
}

/* NAV */
nav {
  background-color: #1e3a8a;
  padding: 15px;
  position: fixed;
  bottom: 0;
  width: 100%;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 10px;
  font-size: 18px;
  font-weight: bold;
  position: relative;
}

/* SUBRAYADO PRO */
nav a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 3px;
  background: #facc15;
  left: 0;
  bottom: -5px;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

nav a:hover {
  color: #facc15;
}

/* ANIMACIONES */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideIn {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}
</style>

</head>

<body>

<h1>Estudios</h1>

<div class="estudios">

  <div class="estudio-item">
    <h2>Primaria: Escuela Oficial Rural Mixta Los Cedros (2015-2021)</h2>
  </div>

  <div class="estudio-item">
    <h2>Básicos: Colegio La Sagrada Enseñanza (2022-2024)</h2>
  </div>

  <div class="estudio-item">
    <h2>Diversificado: Instituto Profesional De Computación (2025-2026)</h2>
  </div>

  <a href="index.html" class="boton">⬅ Volver al Inicio</a>

</div>

<nav>

  <a href="academico.html">Académico</a>

  <a href="hobbies.html">Hobbies</a>
  <a href="referencias.html">Referencias</a>
  <a href="registro.html">Registro</a>
</nav>

</body>
</html>
